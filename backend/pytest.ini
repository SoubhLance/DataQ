[pytest]
pythonpath = .
markers =
    unit: Unit tests for individual services or modules.
    integration: Integration tests for API endpoints.
    slow: Long-running stress or large-scale tests (replay, concurrency, large datasets).
    benchmark: Benchmark tests.
filterwarnings =
    ignore::starlette.exceptions.StarletteDeprecationWarning
    ignore:Using .httpx. with .starlette.testclient. is deprecated:DeprecationWarning
    ignore:Duplicate Operation ID.*:UserWarning
    ignore:.*timeout.*parameter is deprecated:DeprecationWarning
    ignore:.*verify.*parameter is deprecated:DeprecationWarning
    ignore::FutureWarning

